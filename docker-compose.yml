services:
  postgres:
    image: postgres:16-alpine
    container_name: ndc_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ndc_user
      POSTGRES_PASSWORD: ndc_pass
      POSTGRES_DB: ndc_qms
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ndc_user -d ndc_qms"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ndc_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: ndc_api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://ndc_user:ndc_pass@postgres:5432/ndc_qms
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    ports:
      - "${API_PORT:-4000}:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: ndc_web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      INTERNAL_API_URL: http://api:4000
      NODE_ENV: production
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      - api

volumes:
  postgres_data:
